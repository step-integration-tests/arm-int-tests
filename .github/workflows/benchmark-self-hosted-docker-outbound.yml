name: Benchmark-self-hosted-docker-outbound

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 0 * * *'  # Runs daily at 00:00 UTC

jobs:
  docker-outbound-block:
    name: Docker Outbound (Block)
    runs-on: ubuntu-22.04

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit
          allowed-endpoints: >
            archive.ubuntu.com:80
            *.archive.ubuntu.com:80
            github.com:443
            goreleaser.com:443
            production.cloudflare.docker.com:443
            *.docker.io:443
            security.ubuntu.com:80
            *.security.ubuntu.com:80
            *.archive.ubuntu.com:443
            packages.microsoft.com:443
            dl.google.com:443
            esm.ubuntu.com:443
            motd.ubuntu.com:443
            packages.microsoft.com:443

      - run: cat /etc/resolv.conf
      - run: cat /run/systemd/resolve/resolv.conf

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system monitoring tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sysstat procps python3 python3-pandas

      - name: Start StepSecurity agent monitoring
        run: |
          mkdir -p metrics
          AGENT_PID=$(pidof /home/agent/agent)
          if [ -z "$AGENT_PID" ]; then
            echo "Agent not running! Exiting."
            exit 1
          fi
          echo "Agent PID is $AGENT_PID"
          pidstat -hurd -p $AGENT_PID 1 > metrics/agent_pidstat.log &
          echo $! > metrics/agent_monitor_pid.txt

      - name: Run outbound calls from within Docker container
        continue-on-error: true
        run: |
          # Start the container
          docker run --rm -d --name test-container ubuntu:latest sleep 90

          # Install curl in the container
          docker exec test-container apt-get update
          docker exec test-container apt-get install -y curl

          # Print /etc/resolv.conf from the container
          docker exec test-container cat /etc/resolv.conf

          # Make outbound calls
          for i in {1..9}; do
            docker exec test-container curl -I https://www.google.com
            docker exec test-container curl -I https://goreleaser.com
            sleep 10  # wait 10 seconds between calls
          done

          # Stop the container
          docker stop test-container
      - name: Print Docker logs with journalctl
        run: |
            sudo journalctl -u docker.service --no-pager
        shell: bash

      - run: cat /etc/resolv.conf
      - run: cat /run/systemd/resolve/resolv.conf

      - name: Stop StepSecurity agent monitoring
        if: always()
        run: |
          if [ -f metrics/agent_monitor_pid.txt ]; then
            MONITOR_PID=$(cat metrics/agent_monitor_pid.txt)
            kill $MONITOR_PID || true
          fi

      - name: Check if metrics files exist
        if: always()
        run: |
          echo "Checking if metrics files exist..."
          if [ -f metrics/agent_pidstat.log ]; then
            echo "✅ Found metrics/agent_pidstat.log"
          else
            echo "❌ Missing metrics/agent_pidstat.log"
          fi

          if [ -f metrics/agent_monitor_pid.txt ]; then
            echo "✅ Found metrics/agent_monitor_pid.txt"
          else
            echo "❌ Missing metrics/agent_monitor_pid.txt"
          fi

          ls -l metrics || echo "metrics/ directory does not exist"

      - name: Analyze StepSecurity agent resource usage
        if: always()
        run: |
          echo "Analyzing agent metrics..."
          python3 .github/scripts/analyze_agent_metrics.py

      - name: Add resource report to Job Summary
        if: always()
        run: |
          if [ -f metrics/agent_resource_report.txt ]; then
            echo "## StepSecurity Agent Resource Usage" >> $GITHUB_STEP_SUMMARY
            cat metrics/agent_resource_report.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No resource report found to add to summary."
          fi

      - name: Upload metrics and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-outbound-block-agent-metrics
          path: metrics/
          if-no-files-found: warn
