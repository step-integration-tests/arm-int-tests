name: Global Blocklist
on:
  workflow_dispatch:

jobs:
  build:
    name: Global-Blocklist
    runs-on: ubuntu-latest
    steps:           
     - name: Harden the runner (Audit all outbound calls)
       uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
       with:
         egress-policy: audit

     - uses: prateek-stepsecurity/harden-runner@169bf382c794886caddd062d21dcf8f8bb4d54cb # v1.8.0
     # - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
       with:
        egress-policy: audit   
     - uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3.7.0
     
     - name: curl dummyblock.com
       if: always()
       run: "curl dummyblock.com --connect-timeout 5 --max-time 5"
     - name: curl 2.2.2.2
       if: always()
       run: "curl 2.2.2.2 --connect-timeout 5 --max-time 5"
     - name: curl google.com
       if: always()
       run: "curl google.com:443  --connect-timeout 5 --max-time 5"

     - name: curl evil.invalid
       if: always()
       run: "curl https://evil.invalid:443 --connect-timeout 5 --max-time 5" 
