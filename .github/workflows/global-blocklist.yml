name: Global Blocklist
on:
  workflow_dispatch:

jobs:
  build:
    name: Global-Blocklist
    runs-on: ubuntu-latest
    steps:           
     # - uses: prateek-stepsecurity/harden-runner@v1.8.0
     - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
       with:
        egress-policy: audit   
     - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
     
     - name: curl dummyblock.com
       if: always()
       run: "curl dummyblock.com --connect-timeout 5 --max-time 5"
     - name: curl 2.2.2.2
       if: always()
       run: "curl 2.2.2.2 --connect-timeout 5 --max-time 5"
     - name: curl google.com
       if: always()
       run: "curl google.com:443  --connect-timeout 5 --max-time 5"

     - name: curl evil.invalid
       if: always()
       run: "curl https://evil.invalid:443 --connect-timeout 5 --max-time 5" 
