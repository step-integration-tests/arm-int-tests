name: Basic Tests

on:
  workflow_dispatch:

# permissions:
#   contents: read

jobs:
  overwrite:
    if: always()
    runs-on: ARMLinuxRunner
    steps:
      - uses: sailikhith-stepsecurity/harden-runner@feat/dedicated-env
        with:
          egress-policy: audit
          env: sailikhith.dedicated-dev
      - uses: actions/checkout@v3

      - name: echo overwrite
        run: echo "## Overwritten" >> README.md

      - name: mv overwrite
        run: echo "# Replaced" >> README2.md; mv README2.md README.md

  egress-test:
    if: always()
    runs-on: ARMLinuxRunner
    steps:
      - uses: sailikhith-stepsecurity/harden-runner@feat/dedicated-env
        with:
          env: sailikhith.dedicated-dev
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: |
            www.google.com:443

      - uses: actions/checkout@v3

      - run: curl https://www.google.com
      - run: curl https://microsoft.com
